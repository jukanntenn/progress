services:
  app:
    image: 192.168.5.50:5000/progress:latest
    container_name: progress
    ports:
      - "5000:5000"
    volumes:
      - ./config.toml:/app/config.toml
      - ./claude_settings.json:/root/.claude/settings.json
      - ./data:/app/data

    environment:
      - PROGRESS_SCHEDULE_CRON=0 8 * * *

    restart: always
