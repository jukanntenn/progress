# =============================================================================
# Progress Tracker Configuration
# =============================================================================
#
# Role of this file: SEED + INFRASTRUCTURE.
#
# Application configuration now lives in the DATABASE (a versioned JSON blob
# for settings; the repositories/github_owners tables for repos and owners).
# This file is read on FIRST RUN (empty database) to seed that state, and it
# always provides infrastructure settings (data_dir, workspace_dir, db path,
# schedule) that are needed before the database can be opened.
#
#   - First run:  this file seeds the database (app settings -> blob,
#                 [[repos]] -> repositories table, [[owners]] -> github_owners).
#   - After that: the DATABASE is the source of truth. Edits happen via the
#                 web UI (Configuration page) or `progress config import/export`.
#                 Changing this file later does NOT update the running config
#                 unless you run `progress config import` (file -> DB).
#
# Optional settings below are commented out and show their default values.
# Required settings use an example value and are uncommented.
#
# Infrastructure priority: Environment Variables > config file > defaults.
# Environment variable override rules (apply at startup):
#   - Prefix:    PROGRESS_
#   - Separator: __ (double underscore) for nested keys
#   - Examples:  PROGRESS_TIMEZONE="Asia/Shanghai"
#                PROGRESS_GITHUB__GH_TOKEN="ghp_xxx"
#                PROGRESS_DATA_DIR="/app/data"
#   - Boolean env vars: use "true" or "false"
#   - List/array env vars are not well supported via env; use the config file
#     or the web UI.
#
# =============================================================================


# -----------------------------------------------------------------------------
# Global Settings
# -----------------------------------------------------------------------------

# Application language for UI text, reports, and notifications.
# Independent from analysis.language (which controls AI output language).
# Supported values: "en", "zh-hans", or any language with gettext translations.
# Env: PROGRESS_LANGUAGE
language = "en"

# IANA timezone identifier for timestamps in reports and notifications.
# Common values: "UTC", "Asia/Shanghai", "America/New_York", "Europe/London".
# Full list: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
# Env: PROGRESS_TIMEZONE
# timezone = "UTC"

# Base directory for storing runtime data (database, logs, cloned repos).
# Relative paths are resolved from the working directory.
# Env: PROGRESS_DATA_DIR
# data_dir = "data"

# Directory where git repositories are cloned into.
# Defaults to data_dir/repos.
# Env: PROGRESS_WORKSPACE_DIR
# workspace_dir = "data/repos"


# -----------------------------------------------------------------------------
# Observability [observability]  (optional, infrastructure)
# -----------------------------------------------------------------------------
# OpenTelemetry traces/metrics export to JSON-Lines files (no external service)
# for human/AI inspection, and errors/crashes are sent to a Bugsink
# (Sentry-compatible) server. Like data_dir, this is infrastructure: read from
# the file/environment at startup, never stored in the editable config blob.
#
# Env overrides use the PROGRESS_OBSERVABILITY__OTEL__* / PROGRESS_OBSERVABILITY__BUGSINK__*
# prefix, e.g. PROGRESS_OBSERVABILITY__BUGSINK__DSN="http://key@host:port/1"

[observability.otel]
# Enable OpenTelemetry traces + metrics export to JSON-Lines files.
# Env: PROGRESS_OBSERVABILITY__OTEL__ENABLED
# enabled = false

# Directory for traces.jsonl / metrics.jsonl (relative to the working directory).
# Env: PROGRESS_OBSERVABILITY__OTEL__EXPORT_DIR
# export_dir = "data/telemetry"

# Export traces (spans) and metrics. Disable either to skip that signal.
# Env: PROGRESS_OBSERVABILITY__OTEL__TRACES / PROGRESS_OBSERVABILITY__OTEL__METRICS
# traces = true
# metrics = true

# Trace sampling ratio; 1.0 captures everything (recommended for this low-volume
# internal tool). 0 disables trace capture.
# Env: PROGRESS_OBSERVABILITY__OTEL__SAMPLING_RATE
# sampling_rate = 1.0

[observability.bugsink]
# Bugsink DSN. Format: http://{public_key}@{host}:{port}/{project_id}
# Example: http://3a2b8c9d@192.168.5.50:8770/1
# Empty (default) disables error reporting. This value is a secret.
# Env: PROGRESS_OBSERVABILITY__BUGSINK__DSN
# dsn = ""

# Deployment environment tag attached to error events.
# Env: PROGRESS_OBSERVABILITY__BUGSINK__ENVIRONMENT
# environment = "production"


# -----------------------------------------------------------------------------
# GitHub [github]  (required)
# -----------------------------------------------------------------------------
# Credentials and settings for accessing GitHub repositories.

[github]
# GitHub personal access token (PAT). Required.
# Needs `repo` scope for private repos; `public_repo` for public-only.
# Create at: https://github.com/settings/tokens
# Env: PROGRESS_GITHUB__GH_TOKEN
gh_token = "ghp_xxxxxxxxxxxxxxxxxxxx"

# Git clone protocol.
# "https" — uses HTTPS (default). Works behind most firewalls.
# "ssh"   — uses SSH. Requires SSH key configured with GitHub.
# Env: PROGRESS_GITHUB__PROTOCOL
# protocol = "https"

# HTTP/HTTPS/SOCKS5 proxy for git and GitHub CLI operations.
# Examples: "http://127.0.0.1:7890", "socks5://127.0.0.1:1080"
# Empty string means no proxy.
# Env: PROGRESS_GITHUB__PROXY
# proxy = ""

# Timeout in seconds for git CLI commands (clone, fetch, etc.).
# Env: PROGRESS_GITHUB__GIT_TIMEOUT
# git_timeout = 300

# Timeout in seconds for GitHub CLI (gh) commands.
# Env: PROGRESS_GITHUB__GH_TIMEOUT
# gh_timeout = 300


# -----------------------------------------------------------------------------
# AI Analysis [analysis]
# -----------------------------------------------------------------------------
# Controls which AI provider is used and how analysis is performed.

[analysis]
# AI analyzer provider. Determines which backend performs code analysis.
# Supported values:
#   "claude_code" — Uses the Claude Code CLI (`claude`). Requires `claude` installed
#                   and authenticated. Best quality results.
#   "codex"       — Uses the OpenAI Codex CLI (`codex exec --full-auto`). Requires
#                   `codex` installed and configured with an API key.
#   "truncate"    — No AI call. Simply truncates input to `truncate_chars` characters.
#                   Intended for testing and CI environments without AI access.
# Env: PROGRESS_ANALYSIS__PROVIDER
# provider = "claude_code"

# Maximum length (in characters) of git diff content sent to the analyzer.
# Diffs exceeding this are truncated before analysis to avoid timeouts and costs.
# Env: PROGRESS_ANALYSIS__MAX_DIFF_LENGTH
# max_diff_length = 100000

# Number of concurrent analysis tasks.
# Increase for large repo lists when the AI provider supports parallel requests.
# Env: PROGRESS_ANALYSIS__CONCURRENCY
# concurrency = 1

# Timeout in seconds for a single AI analysis call.
# Complex analyses (large diffs) may need higher values.
# Applies per attempt; each retry gets the full window.
# Env: PROGRESS_ANALYSIS__TIMEOUT
# timeout = 600

# Total number of attempts for a single AI analysis call, including the first.
# Transient failures (timeouts, rate limits, provider overload) are retried with
# exponential backoff; permanent failures (tool not found, auth errors) are not.
# Set to 1 to disable retry and try only once.
# Env: PROGRESS_ANALYSIS__RETRIES
# retries = 3

# Initial delay in seconds before the first retry. Doubles on each subsequent
# retry (exponential backoff), capped at 60 seconds.
# Env: PROGRESS_ANALYSIS__RETRY_DELAY
# retry_delay = 5

# Output language for AI analysis results (titles, summaries, diff descriptions).
# This is independent from the top-level `language` setting.
# Examples: "en", "zh", "ja", "ko", "fr", "de", "es", "pt", "ru", "ar".
# Env: PROGRESS_ANALYSIS__LANGUAGE
# language = "en"

# Maximum characters retained when using the "truncate" provider.
# Only takes effect when provider = "truncate".
# Env: PROGRESS_ANALYSIS__TRUNCATE_CHARS
# truncate_chars = 200

# Number of recent commits to analyze on the very first run of a repository
# (when no previous commit is recorded in the database).
# Env: PROGRESS_ANALYSIS__FIRST_RUN_LOOKBACK_COMMITS
# first_run_lookback_commits = 3


# -----------------------------------------------------------------------------
# Report Storage [report]
# -----------------------------------------------------------------------------
# Controls how generated reports are persisted.

# [report]
# Storage backend for reports.
# "auto"    — Uses Markpost if configured, otherwise database.
# "db"      — Always store in the local SQLite database only.
# "file"    — Store as markdown files in the data directory.
# "markpost"— Upload to a Markpost service (requires [markpost] config).
# Env: PROGRESS_REPORT__STORAGE
# storage = "auto"


# -----------------------------------------------------------------------------
# Markpost [markpost]
# -----------------------------------------------------------------------------
# Markpost is a markdown publishing service. When configured, reports are
# uploaded and a public URL is returned for sharing.

# [markpost]
# Markpost publish endpoint URL (including post key).
# When set, markpost.enabled is automatically true.
# Example: "https://markpost.example.com/p/your-post-key"
# Env: PROGRESS_MARKPOST__URL
# url = "https://markpost.example.com/p/your-post-key"

# HTTP request timeout in seconds for Markpost API calls.
# Env: PROGRESS_MARKPOST__TIMEOUT
# timeout = 30

# Maximum batch upload size in bytes. Reports exceeding this are split.
# Env: PROGRESS_MARKPOST__MAX_BATCH_SIZE
# max_batch_size = 1048576


# -----------------------------------------------------------------------------
# Notification [notification]
# -----------------------------------------------------------------------------
# Configure one or more notification channels. Each channel is a
# [[notification.channels]] entry with a `type` discriminator.

# [[notification.channels]]
# Console channel — prints notifications to stdout.
# type = "console"
# enabled = true

# [[notification.channels]]
# Feishu (Lark) bot channel — sends messages via Feishu webhook.
# type = "feishu"
# enabled = true
# Webhook URL from Feishu bot configuration.
# webhook_url = "https://open.feishu.cn/open-apis/bot/v2/hook/xxx"
# HTTP request timeout in seconds.
# timeout = 30

# [[notification.channels]]
# Email channel — sends notifications via SMTP.
# type = "email"
# enabled = false
# SMTP server hostname.
# host = "smtp.163.com"
# SMTP server port (587 for STARTTLS, 465 for SSL).
# port = 465
# SMTP authentication username.
# user = "user@163.com"
# SMTP authentication password or app-specific password.
# password = "xxxx"
# Sender email address.
# from_addr = "user@163.com"
# List of recipient email addresses.
# recipient = ["user@foxmail.com"]
# Use STARTTLS (typically with port 587).
# starttls = false
# Use SSL/TLS (typically with port 465).
# ssl = true


# -----------------------------------------------------------------------------
# Repository Monitoring [[repos]]
# -----------------------------------------------------------------------------
# Each entry defines a GitHub repository to track for code changes.
# At least one repository is required for report generation.

[[repos]]
# Repository identifier. Supported formats:
#   - Short:     "owner/repo"
#   - HTTPS URL: "https://github.com/owner/repo.git"
#   - SSH URL:   "git@github.com:owner/repo.git"
url = "vitejs/vite"

# Branch to track.
# branch = "main"

# Set to false to temporarily skip this repository.
# enabled = true

# Override the global github.protocol for this repository.
# protocol = "https"

# Example: second repository
[[repos]]
url = "facebook/react"

# Example: full URL format
[[repos]]
url = "https://github.com/vitejs/vite.git"

# Example: SSH with per-repo protocol override
[[repos]]
url = "vue/core"
# protocol = "ssh"

# Example: disabled repository
[[repos]]
url = "mycompany/private-repo"
# branch = "develop"
# enabled = false


# -----------------------------------------------------------------------------
# Owner Monitoring [[owners]]
# -----------------------------------------------------------------------------
# Monitor GitHub users and organizations for newly created repositories.
# Discovered repos are analyzed and notifications are sent.

[[owners]]
# Owner type.
type = "organization"
# GitHub username or organization name.
name = "bytedance"
# enabled = true

[[owners]]
type = "user"
name = "torvalds"
# enabled = true

# Example: disabled owner
[[owners]]
type = "organization"
name = "microsoft"
# enabled = false



# -----------------------------------------------------------------------------
# Proposal Tracking [proposal_trackers]
# -----------------------------------------------------------------------------
# Track proposal systems for status changes and new proposals.
# All repository details (URL, branch, directory, file patterns) are configured
# internally — you only specify which kinds to enable.
#
# Supported kinds:
#   "eip" — Ethereum Improvement Proposals (ethereum/EIPs)
#   "erc" — Ethereum Request for Comments (ethereum/ercs)
#   "pep" — Python Enhancement Proposals (python/peps)
#   "rfc" — Rust Request for Comments (rust-lang/rfcs)
#   "dep" — Django Enhancement Proposals (django/deps)
#
# Notifiable events (new proposals, accepted, rejected, withdrawn) trigger
# notifications via configured notification channels.
#
# Example — enable all trackers:
# proposal_trackers = ["eip", "erc", "pep", "rfc", "dep"]


# -----------------------------------------------------------------------------
# Changelog Tracking [[changelog_trackers]]
# -----------------------------------------------------------------------------
# Track software release changelogs from arbitrary URLs. When new versions
# are detected, a merged report is generated and a notification is sent.

# [[changelog_trackers]]
# Human-readable tracker name (used in reports and notifications).
# name = "Vite"
# URL to the changelog page or file.
# url = "https://raw.githubusercontent.com/vitejs/vite/main/packages/vite/CHANGELOG.md"
# Parser for extracting versions from the changelog.
# "markdown_heading"   — Markdown headings like "## 1.2.3"
# "html_chinese_version" — HTML with patterns like "uTools v7.5.1"
# parser_type = "markdown_heading"
# enabled = true
